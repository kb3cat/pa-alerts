<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PA Airports Status Board</title>
  <style>
    :root{
      --bg:#0b1220;
      --panel:#0f1a2e;
      --panel2:#0c1526;
      --text:#e8eefc;
      --muted:#a9b7d6;
      --line:rgba(255,255,255,.12);

      --ok:#2ecc71;
      --warn:#f1c40f;
      --bad:#e74c3c;
      --na:#7f8c8d;

      --pill:#1b2a45;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius:14px;

      --c1: 28%;
      --c2: 12%;
      --c3: 6%;
      --c4: 7%;
      --c5: 7%;
      --c6: 9%;
      --c7: 9%;
      --c8: 7%;
      --c9: 7%;
      --c10: 8%;

      --headerH: 72px;
      --sbw: 0px;
    }

    *{ box-sizing:border-box; }
    html, body{ height: 100%; }

    body{
      margin:0;
      background: linear-gradient(180deg, #071022 0%, #050b16 100%);
      color:var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    header{
      position:sticky;
      top:0;
      z-index:1000;
      background: rgba(7,16,34,.92);
      backdrop-filter: blur(8px);
      border-bottom:1px solid var(--line);
    }

    .header-inner{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 18px;
      gap:12px;
    }

    .title{
      font-size:18px;
      font-weight:700;
      letter-spacing:.3px;
      display:flex;
      align-items:center;
      gap:10px;
      white-space:nowrap;
    }

    .sub{
      color:var(--muted);
      font-size:12px;
      margin-top:2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:60vw;
    }

    .right-controls{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .pill{
      background: rgba(27,42,69,.75);
      border:1px solid var(--line);
      padding:8px 10px;
      border-radius:999px;
      font-size:12px;
      color:var(--text);
      display:inline-flex;
      gap:8px;
      align-items:center;
      user-select:none;
    }
    .pill.clickable{ cursor:pointer; }
    .pill.clickable:hover{ filter:brightness(1.1); }

    .btn{
      cursor:pointer;
      background: rgba(27,42,69,.85);
      border:1px solid var(--line);
      color:var(--text);
      padding:8px 12px;
      border-radius:10px;
      font-size:12px;
      user-select:none;
    }
    .btn:hover{ filter:brightness(1.1); }

    main{
      padding:14px 18px 18px;
      height: calc(100vh - var(--headerH));
      overflow: hidden;
    }

    .section{
      height: 100%;
      background: rgba(15,26,46,.72);
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display:flex;
      flex-direction: column;
    }

    .table-head-bar{
      flex: 0 0 auto;
      background: rgba(12,21,38,.92);
      border-bottom: 1px solid rgba(255,255,255,.14);
      padding-right: var(--sbw);
    }

    table{
      width:100%;
      border-collapse:collapse;
      table-layout: fixed;
    }

    col.c1{ width: var(--c1); }
    col.c2{ width: var(--c2); }
    col.c3{ width: var(--c3); }
    col.c4{ width: var(--c4); }
    col.c5{ width: var(--c5); }
    col.c6{ width: var(--c6); }
    col.c7{ width: var(--c7); }
    col.c8{ width: var(--c8); }
