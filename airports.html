<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PA Airports Status Board</title>
  <style>
    :root{
      --bg:#0b1220;
      --panel:#0f1a2e;
      --panel2:#0c1526;
      --text:#e8eefc;
      --muted:#a9b7d6;
      --line:rgba(255,255,255,.12);

      --ok:#2ecc71;
      --warn:#f1c40f;
      --bad:#e74c3c;
      --na:#7f8c8d;

      --pill:#1b2a45;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius:14px;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      background: linear-gradient(180deg, #071022 0%, #050b16 100%);
      color:var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    header{
      position:sticky;
      top:0;
      z-index:10;
      background: rgba(7,16,34,.92);
      backdrop-filter: blur(8px);
      border-bottom:1px solid var(--line);
    }

    .header-inner{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 18px;
      gap:12px;
    }

    .title{
      font-size:18px;
      font-weight:700;
      letter-spacing:.3px;
      display:flex;
      align-items:center;
      gap:10px;
      white-space:nowrap;
    }

    .sub{
      color:var(--muted);
      font-size:12px;
      margin-top:2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:56vw;
    }

    .right-controls{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .pill{
      background: rgba(27,42,69,.75);
      border:1px solid var(--line);
      padding:8px 10px;
      border-radius:999px;
      font-size:12px;
      color:var(--text);
      display:inline-flex;
      gap:8px;
      align-items:center;
      user-select:none;
    }

    .btn{
      cursor:pointer;
      background: rgba(27,42,69,.85);
      border:1px solid var(--line);
      color:var(--text);
      padding:8px 12px;
      border-radius:10px;
      font-size:12px;
      user-select:none;
    }
    .btn:hover{ filter:brightness(1.1); }

    main{
      padding:14px 18px 24px;
    }

    .section{
      background: rgba(15,26,46,.72);
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
      margin-bottom:14px;
    }

    .section-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:12px 14px;
      background: rgba(12,21,38,.85);
      border-bottom:1px solid var(--line);
    }

    .section-title{
      font-weight:800;
      letter-spacing:.25px;
      font-size:14px;
    }

    .section-meta{
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    thead th{
      text-align:left;
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      padding:10px 14px;
      border-bottom:1px solid var(--line);
      background: rgba(15,26,46,.55);
      position: sticky;
      top: 56px; /* header sticky height-ish */
      z-index: 5;
    }

    tbody td{
      padding:10px 14px;
      border-bottom:1px solid rgba(255,255,255,.06);
      font-size:13px;
      vertical-align:middle;
    }

    tbody tr:hover{
      background: rgba(255,255,255,.04);
    }

    .airport{
      font-weight:800;
      letter-spacing:.2px;
      display:flex;
      flex-direction:column;
      gap:2px;
    }
    .airport .name{
      font-weight:600;
      color:var(--muted);
      font-size:12px;
    }

    .status-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background: rgba(27,42,69,.55);
      width:fit-content;
      font-size:12px;
      font-weight:800;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      display:inline-block;
    }
    .ok{ background: var(--ok); }
    .warn{ background: var(--warn); }
    .bad{ background: var(--bad); }
    .na{ background: var(--na); }

    .delay{
      font-variant-numeric: tabular-nums;
      font-weight:800;
    }

    .metar-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background: rgba(27,42,69,.55);
      font-weight:900;
      font-size:12px;
      letter-spacing:.3px;
      cursor: default;
      user-select:none;
      position: relative;
    }

    .metar-pill[data-cat="VFR"]{ outline: 1px solid rgba(46,204,113,.45); }
    .metar-pill[data-cat="MVFR"]{ outline: 1px solid rgba(241,196,15,.45); }
    .metar-pill[data-cat="IFR"],
    .metar-pill[data-cat="LIFR"]{ outline: 1px solid rgba(231,76,60,.45); }

    /* PEMA region group header row */
    .group-row td{
      background: rgba(9, 15, 28, .96);
      border-top: 1px solid rgba(255,255,255,.14);
      border-bottom: 1px solid rgba(255,255,255,.14);
      padding: 10px 14px;
      font-weight: 900;
      letter-spacing: .3px;
    }
    .group-row .group-meta{
      font-weight: 700;
      color: var(--muted);
      font-size: 12px;
      margin-left: 10px;
    }

    /* Tooltip */
    .tooltip{
      position: fixed;
      z-index: 9999;
      pointer-events:none;
      background: rgba(0,0,0,.88);
      color: #fff;
      border: 1px solid rgba(255,255,255,.18);
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 12px;
      max-width: min(560px, 86vw);
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(6px);
      transition: opacity .08s ease, transform .08s ease;
      white-space: pre-wrap;
      line-height: 1.25;
    }
    .tooltip.show{
      opacity:1;
      transform: translateY(0);
    }

    /* Modal */
    .modal-backdrop{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      z-index: 10000;
      padding: 18px;
    }
    .modal-backdrop.show{ display:flex; }

    .modal{
      width: min(820px, 96vw);
      background: rgba(15,26,46,.96);
      border:1px solid rgba(255,255,255,.18);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .modal-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding: 12px 14px;
      background: rgba(12,21,38,.9);
      border-bottom:1px solid rgba(255,255,255,.14);
      gap: 10px;
    }
    .modal-title{
      font-weight: 900;
      letter-spacing:.2px;
      font-size: 14px;
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .modal-body{
      padding: 14px;
      color: var(--text);
    }
    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      background: rgba(0,0,0,.25);
      border:1px solid rgba(255,255,255,.12);
      border-radius: 12px;
      padding: 12px;
      white-space: pre-wrap;
      line-height: 1.35;
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="title">PA Airports Status Board</div>
      <div class="sub" id="subtitle">
        Live data from <span class="mono" style="padding:2px 6px;border-radius:8px;">data/airports_live.json</span>
        • grouped by PEMA region • polls every 5 minutes
      </div>
    </div>

    <div class="right-controls">
      <div class="pill">Auto-Scroll: <strong id="scrollState">ON</strong></div>
      <button class="btn" id="toggleScroll">Toggle</button>
      <button class="btn" id="jumpTop">Top</button>
    </div>
  </div>
</header>

<main>
  <div class="section">
    <div class="section-header">
      <div class="section-title">PA Airports (Grouped by PEMA Region)</div>
      <div class="section-meta" id="airMeta">Last Updated: —</div>
    </div>

    <table>
      <thead>
        <tr>
          <th style="width:44%;">Airport</th>
          <th style="width:22%;">Status</th>
          <th style="width:12%;">Delay</th>
          <th style="width:22%;">METAR</th>
        </tr>
      </thead>
      <tbody id="airBody"></tbody>
    </table>
  </div>
</main>

<div class="tooltip" id="tooltip"></div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">METAR</div>
      <button class="btn" id="modalClose">Close</button>
    </div>
    <div class="modal-body">
      <div class="mono" id="modalText"></div>
    </div>
  </div>
</div>

<script>
  /***********************
   * IMPORTANT:
   * This page expects a SAME-ORIGIN file at:
   *   data/airports_live.json
   *
   * Your GitHub Action should update that JSON every 5 minutes.
   * This page fetches it every 5 minutes, too.
   ***********************/

  /***********************
   * 1) PEMA county → region mapping
   *    If your internal mapping differs, paste your county lists and we’ll swap this block.
   ***********************/
  const PEMA = {
    Western: new Set([
      "Allegheny","Armstrong","Beaver","Butler","Cambria","Cameron","Clarion","Clearfield",
      "Crawford","Elk","Erie","Fayette","Forest","Greene","Indiana","Jefferson","Lawrence",
      "McKean","Mercer","Somerset","Venango","Warren","Washington","Westmoreland"
    ]),
    Central: new Set([
      "Adams","Bedford","Blair","Bradford","Centre","Clinton","Cumberland","Dauphin",
      "Franklin","Fulton","Huntingdon","Juniata","Lancaster","Lebanon","Lycoming","Mifflin",
      "Perry","Potter","Snyder","Sullivan","Tioga","Union","York"
    ]),
    Eastern: new Set([
      "Berks","Bucks","Carbon","Chester","Columbia","Delaware","Lackawanna","Lehigh",
      "Luzerne","Monroe","Montgomery","Montour","Northampton","Northumberland",
      "Philadelphia","Pike","Schuylkill","Susquehanna","Wayne","Wyoming"
    ])
  };

  function getPemaRegion(county){
    if(!county) return "Unknown";
    if(PEMA.Western.has(county)) return "Western";
    if(PEMA.Central.has(county)) return "Central";
    if(PEMA.Eastern.has(county)) return "Eastern";
    return "Unknown";
  }

  /***********************
   * 2) One combined list (county added)
   *    Add/remove airports here whenever you want.
   ***********************/
  const airportsPA = [
    // Eastern
    { icao:"KPHL", name:"Philadelphia Intl", iata:"PHL", county:"Philadelphia" },
    { icao:"KABE", name:"Lehigh Valley Intl", iata:"ABE", county:"Lehigh" },
    { icao:"KAVP", name:"Wilkes-Barre/Scranton Intl", iata:"AVP", county:"Luzerne" },
    { icao:"KHZL", name:"Hazleton Regional", county:"Luzerne" },

    // Central
    { icao:"KMDT", name:"Harrisburg Intl", iata:"MDT", county:"Dauphin" },
    { icao:"KCXY", name:"Capital City", county:"Dauphin" },
    { icao:"KMUI", name:"Muir AAF (FTIG)", county:"Lebanon" },
    { icao:"KUNV", name:"State College / Univ Park", iata:"SCE", county:"Centre" },
    { icao:"KAOO", name:"Altoona–Blair County", iata:"AOO", county:"Blair" },
    { icao:"KLNS", name:"Lancaster", county:"Lancaster" },
    { icao:"KIPT", name:"Williamsport Regional", iata:"IPT", county:"Lycoming" },

    // Western
    { icao:"KPIT", name:"Pittsburgh Intl", iata:"PIT", county:"Allegheny" },
    { icao:"KAGC", name:"Allegheny County", county:"Allegheny" },
    { icao:"KLBE", name:"Arnold Palmer Regional", iata:"LBE", county:"Westmoreland" },
    { icao:"KJST", name:"John Murtha Johnstown", iata:"JST", county:"Cambria" },
    { icao:"KERI", name:"Erie Intl", iata:"ERI", county:"Erie" },
    { icao:"KDUJ", name:"DuBois Regional", county:"Jefferson" },
    { icao:"KBFD", name:"Bradford Regional", county:"McKean" },
    { icao:"KBTP", name:"Butler County", county:"Butler" },
    { icao:"KFKL", name:"Venango Regional (Franklin)", county:"Venango" },
    { icao:"KIDI", name:"Indiana County (Jimmy Stewart Field)", county:"Indiana" }
  ];

  /***********************
   * 3) Live data store (filled by refreshLive())
   *    The rendering uses this object.
   ***********************/
  const liveByIcao = {}; // { KXXX: {status, delay, cat, raw} }

  function statusToDotClass(status){
    const s = (status || "").toLowerCase();
    if (s === "ok") return "ok";
    if (s.includes("delay") || s.includes("deicing") || s.includes("weather")) return "warn";
    if (s.includes("ground stop") || s.includes("closed")) return "bad";
    return "na";
  }

  function escapeAttr(str){
    return String(str)
      .replaceAll("&","&amp;")
      .replaceAll("\"","&quot;")
      .replaceAll("'","&#39;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;");
  }

  function groupOrder(region){
    if(region === "Western") return 1;
    if(region === "Central") return 2;
    if(region === "Eastern") return 3;
    return 9;
  }

  function rowHTML(a){
    const d = liveByIcao[a.icao] || { status:"Unknown", delay:"—", cat:"—", raw:"—" };
    const dot = statusToDotClass(d.status);
    const displayAirport = `${a.icao}${a.iata ? " ("+a.iata+")" : ""}`;

    const pemaRegion = getPemaRegion(a.county);
    const locBits = [
      a.name || "",
      (a.county ? `${a.county} County` : ""),
      (pemaRegion !== "Unknown" ? pemaRegion : "")
    ].filter(Boolean).join(" • ");

    const raw = (d.raw || "—");

    return `
      <tr>
        <td>
          <div class="airport">
            <div>${displayAirport}</div>
            <div class="name">${locBits}</div>
          </div>
        </td>
        <td>
          <span class="status-pill">
            <span class="dot ${dot}"></span>
            <span>${d.status || "—"}</span>
          </span>
        </td>
        <td class="delay">${d.delay ?? "—"}</td>
        <td>
          <span class="metar-pill"
                data-cat="${d.cat || "—"}"
                data-icao="${a.icao}"
                data-raw="${escapeAttr(raw)}">
            ${d.cat || "—"}
          </span>
        </td>
      </tr>
    `;
  }

  function groupHeaderHTML(regionName, count){
    return `
      <tr class="group-row">
        <td colspan="4">
          ${regionName}
          <span class="group-meta">(${count} airport${count === 1 ? "" : "s"})</span>
        </td>
      </tr>
    `;
  }

  function render(){
    const list = airportsPA.map(a => ({
      ...a,
      pemaRegion: getPemaRegion(a.county)
    }));

    list.sort((a,b) => {
      const go = groupOrder(a.pemaRegion) - groupOrder(b.pemaRegion);
      if(go !== 0) return go;
      return a.icao.localeCompare(b.icao);
    });

    const order = ["Western","Central","Eastern","Unknown"];
    let html = "";
    for(const r of order){
      const grp = list.filter(x => x.pemaRegion === r);
      if(!grp.length) continue;
      html += groupHeaderHTML(r, grp.length);
      html += grp.map(rowHTML).join("");
    }

    document.getElementById("airBody").innerHTML = html;
  }

  /***********************
   * 4) Live data fetch (every 5 minutes)
   *
   * Expected JSON shape:
   * {
   *   "generatedAt": "2026-03-05T....Z",
   *   "airports": {
   *     "KMDT": { "status":"OK", "delay":"—", "metarCat":"VFR", "metarRaw":"...", ... },
   *     ...
   *   }
   * }
   ***********************/
  async function refreshLive() {
    try {
      const url = `data/airports_live.json?ts=${Date.now()}`;
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();
      const airports = data?.airports || {};

      // Populate liveByIcao
      for (const [icao, v] of Object.entries(airports)) {
        liveByIcao[icao] = {
          status: v.status ?? "Unknown",
          delay: v.delay ?? "—",
          cat: v.metarCat ?? v.cat ?? "—",
          raw: v.metarRaw ?? v.raw ?? "—"
        };
      }

      // Render updated view
      render();

      // Update header timestamp
      const meta = document.getElementById("airMeta");
      if (meta) {
        if (data?.generatedAt) {
          const dt = new Date(data.generatedAt);
          meta.textContent = `Last Updated: ${dt.toLocaleString(undefined, { hour12:false })}`;
        } else {
          const now = new Date();
          meta.textContent = `Last Updated: ${now.toLocaleString(undefined, { hour12:false })}`;
        }
      }
    } catch (err) {
      console.warn("refreshLive failed:", err);

      // Still render something (Unknown rows) if first load fails
      render();

      const meta = document.getElementById("airMeta");
      if (meta) meta.textContent = `Last Updated: (live data unavailable)`;
    }
  }

  /***********************
   * 5) Tooltip + modal for METAR raw
   ***********************/
  const tooltip = document.getElementById("tooltip");
  let tipVisible = false;

  function showTip(text, x, y){
    tooltip.textContent = text;
    tooltip.style.left = (x + 14) + "px";
    tooltip.style.top  = (y + 14) + "px";
    tooltip.classList.add("show");
    tipVisible = true;
  }
  function moveTip(x, y){
    if(!tipVisible) return;
    tooltip.style.left = (x + 14) + "px";
    tooltip.style.top  = (y + 14) + "px";
  }
  function hideTip(){
    tooltip.classList.remove("show");
    tipVisible = false;
  }

  // Modal
  const modalBackdrop = document.getElementById("modalBackdrop");
  const modalTitle = document.getElementById("modalTitle");
  const modalText = document.getElementById("modalText");
  document.getElementById("modalClose").addEventListener("click", () => modalBackdrop.classList.remove("show"));
  modalBackdrop.addEventListener("click", (e) => { if(e.target === modalBackdrop) modalBackdrop.classList.remove("show"); });
  window.addEventListener("keydown", (e) => { if(e.key === "Escape") modalBackdrop.classList.remove("show"); });

  function openMetarModal(icao, cat, raw){
    modalTitle.textContent = `${icao} — ${cat || "—"} METAR`;
    modalText.textContent = raw || "—";
    modalBackdrop.classList.add("show");
  }

  document.addEventListener("mouseover", (e) => {
    const pill = e.target.closest(".metar-pill");
    if(!pill) return;
    const raw = pill.getAttribute("data-raw") || "—";
    showTip(raw, e.clientX, e.clientY);
  });
  document.addEventListener("mousemove", (e) => moveTip(e.clientX, e.clientY));
  document.addEventListener("mouseout", (e) => {
    if(e.target.closest(".metar-pill")) hideTip();
  });

  document.addEventListener("click", (e) => {
    const pill = e.target.closest(".metar-pill");
    if(!pill) return;
    const icao = pill.getAttribute("data-icao");
    const cat  = pill.getAttribute("data-cat");
    const raw  = pill.getAttribute("data-raw");
    openMetarModal(icao, cat, raw);
  });

  /***********************
   * 6) Auto-scroll (down → fast to top)
   ***********************/
  let autoScrollOn = true;
  const scrollState = document.getElementById("scrollState");

  const scrollConfig = {
    pixelsPerTick: 1,
    tickMs: 18,
    bottomPauseMs: 1400,
    topPauseMs: 600,
    jumpToTopMs: 120
  };

  function setScrollState(){
    scrollState.textContent = autoScrollOn ? "ON" : "OFF";
  }
  setScrollState();

  document.getElementById("toggleScroll").addEventListener("click", () => {
    autoScrollOn = !autoScrollOn;
    setScrollState();
  });

  document.getElementById("jumpTop").addEventListener("click", () => {
    window.scrollTo({ top: 0, behavior: "instant" });
  });

  let scrollTimer = null;
  let pauseTimer = null;

  function clearTimers(){
    if(scrollTimer) { clearInterval(scrollTimer); scrollTimer = null; }
    if(pauseTimer)  { clearTimeout(pauseTimer); pauseTimer = null; }
  }

  function smoothJumpToTop(durationMs){
    const start = window.scrollY;
    const startTime = performance.now();

    function step(t){
      const p = Math.min(1, (t - startTime) / durationMs);
      const eased = 1 - Math.pow(1 - p, 3); // easeOutCubic
      window.scrollTo(0, Math.round(start * (1 - eased)));
      if(p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  function startAutoScrollLoop(){
    clearTimers();

    scrollTimer = setInterval(() => {
      if(!autoScrollOn) return;

      const atBottom = (window.innerHeight + window.scrollY) >= (document.body.offsetHeight - 2);
      if(atBottom){
        clearInterval(scrollTimer);
        scrollTimer = null;

        pauseTimer = setTimeout(() => {
          if(!autoScrollOn) return;

          smoothJumpToTop(scrollConfig.jumpToTopMs);

          pauseTimer = setTimeout(() => {
            startAutoScrollLoop();
          }, scrollConfig.topPauseMs);

        }, scrollConfig.bottomPauseMs);

        return;
      }

      window.scrollBy(0, scrollConfig.pixelsPerTick);
    }, scrollConfig.tickMs);
  }

  /***********************
   * 7) Start-up
   ***********************/
  window.addEventListener("load", async () => {
    // First paint (Unknowns)
    render();

    // First live fetch
    await refreshLive();

    // Repeat every 5 minutes
    setInterval(refreshLive, 5 * 60 * 1000);

    // Start scrolling
    startAutoScrollLoop();
  });
</script>

</body>
</html>
