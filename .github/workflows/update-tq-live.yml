name: Update TQ Live Data

on:
  workflow_dispatch:
    inputs:
      event_ids:
        description: "Optional 511PA event IDs, comma-separated. Leave blank to auto-discover from traffic data files."
        required: false
        default: ""

  repository_dispatch:
    types:
      - update-tq-live

  # Beta schedule. Keep this modest while testing API usage.
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: update-tq-live
  cancel-in-progress: true

jobs:
  update-tq-live:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run TQ live updater
        env:
          TOMTOM_KEY: ${{ secrets.TOMTOM_KEY }}
          TQ_EVENT_IDS: ${{ github.event.inputs.event_ids || github.event.client_payload.event_ids || '' }}
          TQ_INPUT_FILES: "data/major_route_closures.json,data/lane_restrictions.json"
          TQ_SAMPLE_EVERY_MILES: "0.25"
          TQ_MAX_SAMPLE_POINTS: "24"
          TQ_MAX_EVENTS: "20"
        run: node scripts/update_tq_live.mjs

      - name: Commit updated TQ live data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/tq_live.json

          if git diff --cached --quiet; then
            echo "No TQ live data changes."
            exit 0
          fi

          git commit -m "Update TQ live data"

          git pull --rebase origin main
          git push
