name: Update storm datasets (NCEI + recent LSR)

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: update-storm-datasets
  cancel-in-progress: false

jobs:
  update-storm-datasets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Build PA storm events JSON (historical)
        run: |
          python scripts/build_storm_events_pa.py

      - name: Build recent PA storm events JSON (LSR)
        run: |
          python scripts/build_storm_events_recent_pa.py

      - name: Commit if changed
        shell: bash
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/storm_events_pa.json data/storm_events_recent_pa.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update storm datasets (NCEI + recent LSR)"

          for i in 1 2 3 4 5; do
            echo "Push attempt $i..."
            git pull --rebase origin main && git push origin main && exit 0
            echo "Push attempt $i failed; retrying in 5 seconds..."
            sleep 5
          done

          echo "Push failed after multiple attempts."
          exit 1
