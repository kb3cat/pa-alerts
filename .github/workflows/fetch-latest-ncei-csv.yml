name: Fetch Latest NCEI CSV

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 */14 * *"

permissions:
  contents: write

jobs:
  fetch-latest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch latest NCEI details CSV
        run: |
          python scripts/fetch_latest_ncei_csv.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/raw/StormEvents_details_latest.csv.gz
          git add data/raw/StormEvents_details_latest.meta.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update latest NCEI StormEvents CSV"
          git push
