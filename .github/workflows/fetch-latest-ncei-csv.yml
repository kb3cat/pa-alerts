name: Update Storm Data (NCEI + Recent LSR)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 */14 * *"

permissions:
  contents: write

jobs:
  build-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # ----------------------------------------
      # STEP 1: Fetch latest NCEI CSV
      # ----------------------------------------
      - name: Fetch latest NCEI details CSV
        run: |
          python scripts/fetch_latest_ncei_csv.py

      # ----------------------------------------
      # STEP 2: Build historical PA dataset
      # ----------------------------------------
      - name: Build PA storm events JSON (historical)
        run: |
          python scripts/build_storm_events_pa.py

      # ----------------------------------------
      # STEP 3: Build recent LSR dataset
      # ----------------------------------------
      - name: Build recent PA storm events JSON (LSR)
        run: |
          python scripts/build_storm_events_recent_pa.py

      # ----------------------------------------
      # STEP 4: Commit results
      # ----------------------------------------
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/raw/StormEvents_details_latest.csv.gz
          git add data/raw/StormEvents_details_latest.meta.json
          git add data/storm_events_pa.json
          git add data/storm_events_recent_pa.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update storm datasets (NCEI + recent LSR)"
          git push
