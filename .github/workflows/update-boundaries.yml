name: Update Boundaries

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 1 * *"

permissions:
  contents: write

concurrency:
  group: update-boundaries
  cancel-in-progress: true

jobs:
  boundaries:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests geopandas shapely fiona pyogrio

      - name: Build boundary GeoJSON
        run: |
          python scripts/build_boundaries.py

      - name: Show generated files
        run: |
          ls -l data
          echo "---- cwa_boundaries.geojson ----"
          head -20 data/cwa_boundaries.geojson || true
          echo "---- pa_boundary.geojson ----"
          head -20 data/pa_boundary.geojson || true

      - name: Commit updated boundaries
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/cwa_boundaries.geojson
          git add data/pa_boundary.geojson

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update boundary GeoJSON"

          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push failed, retrying in 5 seconds..."
            sleep 5
          done
