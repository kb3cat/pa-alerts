name: Storm Reports

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stormreports
  cancel-in-progress: true

jobs:
  stormreports:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate storm report data
        run: |
          python scripts/build_stormreports.py

      - name: Show generated file
        run: |
          ls -l data
          echo "---- stormreports.json ----"
          head -40 data/stormreports.json || true

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/stormreports.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update storm reports"

          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push failed, retrying in 5 seconds..."
            sleep 5
          done
