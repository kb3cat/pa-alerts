name: Storm Reports

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:

  stormreports:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests geopandas shapely fiona pyogrio

      # --------------------------------------------------------
      # Generate storm report JSON
      # --------------------------------------------------------

      - name: Generate storm report data
        run: |
          python scripts/build_stormreports.py

      # --------------------------------------------------------
      # Build Pennsylvania + NWS office boundary GeoJSON
      # --------------------------------------------------------

      - name: Build boundary GeoJSON
        run: |
          python scripts/build_boundaries.py

      # --------------------------------------------------------
      # Commit updated data
      # --------------------------------------------------------

      - name: Commit updated files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/stormreports.json
          git add data/cwa_boundaries.geojson
          git add data/pa_boundary.geojson

          git commit -m "Update storm reports and boundaries" || echo "No changes"

          git push
