name: update-media-deck

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

concurrency:
  group: media-deck
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with latest main
        run: |
          git fetch origin main
          git checkout main
          git pull --rebase origin main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Scrape PSP X feed
        run: node scripts/scrape_psp_x.mjs

      - name: Build media deck data
        run: npm run update:media-deck

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/media_deck.json data/psp_x.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update media deck data"
            git pull --rebase --autostash origin main
            git push origin main
          fi
