name: Update Power Outages

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch:

jobs:
  update-power:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          python -m playwright install --with-deps chromium

      # ============================
      # FIRSTENERGY (existing script)
      # ============================
      - name: Run FirstEnergy outage script
        run: python3 scripts/power_outages.py

      # ============================
      # PPL (new API script)
      # ============================
      - name: Run PPL outage script
        run: python3 scripts/power_outages_ppl.py

      # ============================
      # COMMIT RESULTS
      # ============================
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/*.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update power outage data"
            git push
          fi
