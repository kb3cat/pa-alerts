name: Update FirstEnergy PA Power Outages

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  update-power-outages:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Ensure data folder exists
        run: mkdir -p data

      - name: Run power outage script
        id: scrape
        run: |
          python scripts/power_outages.py \
            --output data/power_outages_pa.json \
            --previous data/previous_power_outages_pa.json

      - name: Verify output files
        if: always()
        run: |
          echo "Listing data directory:"
          ls -lah data || true

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: power-outages-debug
          path: |
            data/power_outages_pa.json
            data/previous_power_outages_pa.json
            data/power_outages_debug.html
            data/power_outages_debug.json
            data/power_outages_debug.png
          if-no-files-found: ignore

      - name: Commit updated data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            data/power_outages_pa.json \
            data/previous_power_outages_pa.json \
            data/power_outages_debug.html \
            data/power_outages_debug.json \
            data/power_outages_debug.png || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update power outage data"
            git pull --rebase origin main
            git push origin main
          fi
