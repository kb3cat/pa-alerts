name: Update FirstEnergy PA Power Outages

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  update-power-outages:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Ensure data folder exists
        run: mkdir -p data

      - name: Run power outage script
        run: python scripts/power_outages.py --output data/power_outages_pa.json

      - name: Verify output file
        run: |
          ls -l data
          test -f data/power_outages_pa.json

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/power_outages_pa.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update power outage data"
            git push
          fi
