name: Update Power Outages

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-power:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          python -m playwright install --with-deps chromium

      - name: Ensure data folder exists
        run: mkdir -p data

      - name: Run FirstEnergy outage script
        id: fe
        continue-on-error: true
        run: python3 scripts/power_outages.py

      - name: Run PPL outage script
        id: ppl
        continue-on-error: true
        run: python3 scripts/power_outages_ppl.py

      - name: Run Duquesne outage script
        id: duq
        continue-on-error: true
        run: node scripts/power_outages_duq.py

      - name: Merge Utilities
        id: merge
        continue-on-error: true
        run: python3 scripts/merge_power_data.py

      - name: List data directory
        if: always()
        run: |
          echo "==== DATA DIRECTORY ===="
          ls -lah data || true

      - name: Show PPL debug file
        if: always()
        run: |
          echo "==== PPL DEBUG JSON ===="
          cat data/power_outages_ppl_debug.json || true

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: power-outages-debug
          path: |
            data/*.json
            data/*.html
            data/*.png
          if-no-files-found: ignore

      - name: Commit and push if changed
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/*.json data/*.html data/*.png || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update power outage data"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Fail workflow if FirstEnergy failed
        if: steps.fe.outcome == 'failure'
        run: |
          echo "FirstEnergy script failed"
          exit 1

      - name: Fail workflow if PPL failed
        if: steps.ppl.outcome == 'failure'
        run: |
          echo "PPL script failed"
          exit 1

      - name: Fail workflow if Duquesne failed
        if: steps.duq.outcome == 'failure'
        run: |
          echo "Duquesne script failed"
          exit 1

      - name: Fail workflow if merge failed
        if: steps.merge.outcome == 'failure'
        run: |
          echo "Merge script failed"
          exit 1
