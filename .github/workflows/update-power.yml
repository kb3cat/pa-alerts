name: Update Power Outages

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-power:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          python -m playwright install --with-deps chromium

      - name: Ensure data folder exists
        run: mkdir -p data

      - name: Run FirstEnergy outage script
        run: python3 scripts/power_outages.py

      - name: Run PPL outage script
        run: python3 scripts/power_outages_ppl.py

      - name: List data directory
        if: always()
        run: |
          ls -lah data || true

      - name: Commit and push if changed
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/*.json data/*.html data/*.png || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update power outage data"
            git pull --rebase origin main
            git push origin main
          fi
