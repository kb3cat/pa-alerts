<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NWS/Pennsylvania Storm Reports</title>

  rel="stylesheet"

/>

<style>
:root{
  --bg:#0f0f10;
  --panel:#1d1d1f;
  --panel-dark:#18181a;
  --office:#242427;
  --border:#2a2a2d;
  --text:#e9e9ea;
  --muted:#a7a7aa;

  /* SPC/NWS-style colors */
  --tornado:#ff0000;
  --hail:#00b200;
  --windgust:#0033ff;
  --winddmg:#66b2ff;
  --sighail:#007000;
  --sigwind:#000099;

  --snow:#19d7e6;
  --snowsquall:#0b7da7;
  --blizzard:#800080;
  --freezingrain:#ff8c00;
  --avalanche:#c9a0ff;
  --sleet:#e6e600;
  --snowicedmg:#ff00ff;

  --rain:#4f8f00;
  --flood:#7cff00;
  --flashflood:#00ff00;
  --debrisflow:#d8a060;
  --landslide:#b8925c;
  --lakeshoreflood:#001a66;

  --wildfire:#8b4513;
  --drought:#c8a200;
  --fog:#808000;
  --volcanicash:#9370db;
  --icejam:#6b1f1f;
  --icejamflood:#b76e79;

  --other:#8e8e93;
}

*{ box-sizing:border-box; }

html, body{
  margin:0;
  padding:0;
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:Arial, Helvetica, sans-serif;
  overflow:hidden;
}

body{
  display:flex;
  flex-direction:column;
}

/* HEADER */
.topbar{
  flex:0 0 84px;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:18px;
  padding:12px 16px 10px 16px;
  background:#222;
  border-bottom:2px solid var(--border);
}

.header-left{
  display:flex;
  flex-direction:column;
  min-width:0;
}

.title{
  font-size:30px;
  font-weight:700;
  line-height:1.1;
  letter-spacing:.2px;
}

.last-updated{
  margin-top:6px;
  font-size:14px;
  color:var(--muted);
  font-weight:600;
}

.header-right{
  text-align:right;
  font-size:14px;
  color:var(--text);
  font-weight:600;
  line-height:1.35;
  max-width:560px;
}

/* MAIN */
.main{
  flex:1 1 auto;
  min-height:0;
  display:flex;
  flex-direction:column;
}

/* MAP */
.map-wrap{
  flex:0 0 48%;
  min-height:280px;
  background:var(--panel);
  border-bottom:2px solid var(--border);
  position:relative;
}

#map{
  width:100%;
  height:100%;
}

.map-legend{
  position:absolute;
  right:12px;
  bottom:12px;
  z-index:500;
  background:rgba(24,24,26,.94);
  border:1px solid var(--border);
  border-radius:8px;
  padding:8px 10px;
  font-size:12px;
  line-height:1.45;
  box-shadow:0 2px 8px rgba(0,0,0,.35);
  min-width:160px;
}

.map-legend .legend-title{
  font-weight:700;
  margin-bottom:6px;
  color:var(--text);
}

.legend-item{
  display:flex;
  align-items:center;
  gap:7px;
  color:var(--text);
  margin:2px 0;
}

.legend-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  border:1px solid #111;
  display:inline-block;
  flex:0 0 10px;
}

/* REPORTS AREA */
.reports-shell{
  flex:1 1 auto;
  min-height:0;
  display:flex;
  flex-direction:column;
  background:var(--bg);
}

/* Locked column labels */
.column-header{
  flex:0 0 auto;
  display:grid;
  grid-template-columns: 90px 165px 90px 170px 130px 150px 1fr;
  gap:0;
  background:var(--panel-dark);
  border-bottom:2px solid var(--border);
  border-top:1px solid var(--border);
  padding-right:12px;
}

.column-header div{
  padding:10px 10px;
  font-size:13px;
  font-weight:700;
  color:var(--text);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* Scrolling content */
.reports-scroll{
  flex:1 1 auto;
  min-height:0;
  overflow-y:auto;
  overflow-x:hidden;
  background:var(--bg);
}

/* Office rows */
.office-header{
  background:var(--office);
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  padding:8px 12px;
  font-size:16px;
  font-weight:700;
  letter-spacing:.2px;
}

.office-empty{
  padding:14px 12px 18px 12px;
  color:var(--muted);
  font-size:14px;
  background:var(--panel);
  border-bottom:1px solid var(--border);
}

.report-row{
  display:grid;
  grid-template-columns: 90px 165px 90px 170px 130px 150px 1fr;
  gap:0;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  cursor:pointer;
  transition:background .15s ease;
}

.report-row:hover{
  background:#252528;
}

.report-row.active{
  background:#2b2b31;
  outline:1px solid #3a3a40;
}

.report-row > div{
  padding:9px 10px;
  font-size:13px;
  line-height:1.35;
  overflow:hidden;
  text-overflow:ellipsis;
}

.col-time,
.col-mag,
.col-county{
  white-space:nowrap;
}

.col-event{
  font-weight:700;
}

.event-pill{
  display:inline-block;
  padding:2px 7px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
  line-height:1.2;
  border:1px solid rgba(0,0,0,.45);
  color:#fff;
  max-width:100%;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.event-tornado{ background:var(--tornado); color:#fff; }
.event-hail{ background:var(--hail); color:#001900; }
.event-sighail{ background:var(--sighail); color:#fff; }
.event-windgust{ background:var(--windgust); color:#fff; }
.event-winddmg{ background:var(--winddmg); color:#00151d; }
.event-sigwind{ background:var(--sigwind); color:#fff; }

.event-snow{ background:var(--snow); color:#002428; }
.event-snowsquall{ background:var(--snowsquall); color:#fff; }
.event-blizzard{ background:var(--blizzard); color:#fff; }
.event-freezingrain{ background:var(--freezingrain); color:#241500; }
.event-avalanche{ background:var(--avalanche); color:#241532; }
.event-sleet{ background:var(--sleet); color:#222; }
.event-snowicedmg{ background:var(--snowicedmg); color:#fff; }

.event-rain{ background:var(--rain); color:#f3ffe6; }
.event-flood{ background:var(--flood); color:#102400; }
.event-flashflood{ background:var(--flashflood); color:#002200; }
.event-debrisflow{ background:var(--debrisflow); color:#2b1a00; }
.event-landslide{ background:var(--landslide); color:#211200; }
.event-lakeshoreflood{ background:var(--lakeshoreflood); color:#fff; }

.event-wildfire{ background:var(--wildfire); color:#fff2e8; }
.event-drought{ background:var(--drought); color:#241d00; }
.event-fog{ background:var(--fog); color:#fff; }
.event-volcanicash{ background:var(--volcanicash); color:#fff; }
.event-icejam{ background:var(--icejam); color:#fff; }
.event-icejamflood{ background:var(--icejamflood); color:#1d0d0d; }

.event-other{ background:var(--other); color:#fff; }

.remarks{
  white-space:normal;
  overflow:visible;
  text-overflow:unset;
}

/* Leaflet popup */
.leaflet-popup-content-wrapper,
.leaflet-popup-tip{
  background:#1d1d1f;
  color:var(--text);
}

.leaflet-popup-content{
  margin:10px 12px;
  font-family:Arial, Helvetica, sans-serif;
  font-size:13px;
  line-height:1.45;
}

.popup-title{
  font-weight:700;
  font-size:14px;
  margin-bottom:6px;
}

.popup-grid{
  display:grid;
  grid-template-columns:auto 1fr;
  gap:3px 8px;
}

.popup-label{
  color:var(--muted);
  font-weight:700;
}

/* WFO labels */
.wfo-label{
  background:rgba(24,24,26,.88);
  color:var(--text);
  border:1px solid var(--border);
  padding:2px 6px;
  border-radius:4px;
  font-size:11px;
  font-weight:700;
  white-space:nowrap;
}

@media (max-width: 1200px){
  .title{ font-size:24px; }
  .header-right{ font-size:13px; max-width:430px; }
  .column-header,
  .report-row{
    grid-template-columns: 80px 150px 80px 150px 120px 135px 1fr;
  }
}
</style>

function formatDateTimeHeader(dateStr){
  const d = new Date(dateStr);
  const mm = String(d.getMonth() + 1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  const yy = String(d.getFullYear()).slice(-2);
  const hh = String(d.getHours()).padStart(2,"0");
  const min = String(d.getMinutes()).padStart(2,"0");
  return `${mm}/${dd}/${yy} ${hh}:${min} hours`;
}

function formatWindowText(dateStr){
  const d = new Date(dateStr);
  const mm = String(d.getMonth() + 1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  const yy = String(d.getFullYear()).slice(-2);
  const hh = String(d.getHours()).padStart(2,"0");
  const min = String(d.getMinutes()).padStart(2,"0");
  return `${mm}/${dd}/${yy} at ${hh}:${min} hours`;
}

function formatRowTime(dateStr){
  const d = new Date(dateStr);
  const hh = String(d.getHours()).padStart(2,"0");
  const min = String(d.getMinutes()).padStart(2,"0");
  return `${hh}:${min}`;
}

function escapeHtml(str){
  return String(str ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function normalizeEventName(eventName){
  return String(eventName || "").trim().toUpperCase();
}

function getEventKey(eventName, magnitude){
  const e = normalizeEventName(eventName);
  const mag = String(magnitude || "").toUpperCase();

  if (e.includes("TORNADO") || e.includes("FUNNEL")) return "tornado";

  if (e.includes("HAIL")){
    const numeric = parseFloat(String(magnitude).replace(/[^0-9.]/g, ""));
    if (!Number.isNaN(numeric) && numeric >= 2.00) return "sighail";
    if (mag.includes("SIG")) return "sighail";
    return "hail";
  }

  if (e.includes("TSTM WND GST") || e.includes("THUNDERSTORM WIND GUST") || e === "NON-TSTM WND GST" || e.includes("NON TSTM WND GST")){
    const numeric = parseFloat(String(magnitude).replace(/[^0-9.]/g, ""));
    if (!Number.isNaN(numeric) && numeric >= 75) return "sigwind";
    if (mag.includes("SIG")) return "sigwind";
    return "windgust";
  }

  if (
    e.includes("TSTM WND DMG") ||
    e.includes("THUNDERSTORM WIND DAMAGE") ||
    e.includes("NON-TSTM WND DMG") ||
    e.includes("NON TSTM WND DMG") ||
    e.includes("WIND DAMAGE")
  ) return "winddmg";

  if (e.includes("SIG WIND")) return "sigwind";

  if (e.includes("FLASH FLOOD")) return "flashflood";
  if (e.includes("LAKESHORE FLD")) return "lakeshoreflood";
  if (e.includes("FLOOD")) return "flood";
  if (e === "RAIN" || e.includes("HEAVY RAIN")) return "rain";

  if (e.includes("SNOW SQUALL")) return "snowsquall";
  if (e.includes("BLIZZARD")) return "blizzard";
  if (e.includes("FREEZING RAIN")) return "freezingrain";
  if (e.includes("AVALANCHE")) return "avalanche";
  if (e.includes("SLEET")) return "sleet";
  if (e.includes("SNOW/ICE DMG") || e.includes("SNOW ICE DMG") || e.includes("ICE DAMAGE")) return "snowicedmg";
  if (e.includes("SNOW")) return "snow";

  if (e.includes("DEBRIS FLOW")) return "debrisflow";
  if (e.includes("LANDSLIDE")) return "landslide";

  if (e.includes("WILDFIRE")) return "wildfire";
  if (e.includes("DROUGHT")) return "drought";
  if (e === "FOG" || e.includes("DENSE FOG")) return "fog";
  if (e.includes("VOLCANIC ASH")) return "volcanicash";
  if (e.includes("ICE JAM FLOOD")) return "icejamflood";
  if (e.includes("ICE JAM")) return "icejam";

  return "other";
}

function getEventCssClass(eventName, magnitude){
  return `event-${getEventKey(eventName, magnitude)}`;
}

function getCssVar(name){
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function getEventColor(eventName, magnitude){
  const key = getEventKey(eventName, magnitude);

  const colorMap = {
    tornado: "--tornado",
    hail: "--hail",
    sighail: "--sighail",
    windgust: "--windgust",
    winddmg: "--winddmg",
    sigwind: "--sigwind",
    snow: "--snow",
    snowsquall: "--snowsquall",
    blizzard: "--blizzard",
    freezingrain: "--freezingrain",
    avalanche: "--avalanche",
    sleet: "--sleet",
    snowicedmg: "--snowicedmg",
    rain: "--rain",
    flood: "--flood",
    flashflood: "--flashflood",
    debrisflow: "--debrisflow",
    landslide: "--landslide",
    lakeshoreflood: "--lakeshoreflood",
    wildfire: "--wildfire",
    drought: "--drought",
    fog: "--fog",
    volcanicash: "--volcanicash",
    icejam: "--icejam",
    icejamflood: "--icejamflood",
    other: "--other"
  };

  return getCssVar(colorMap[key] || "--other");
}

function renderHeader(data){
  document.getElementById("lastUpdated").textContent =
    `Last Updated: ${formatDateTimeHeader(data.generated_at)}`;

  document.getElementById("reportWindow").textContent =
    `Storm reports from ${formatWindowText(data.window_start)} to ${formatWindowText(data.window_end)}`;
}

function renderReports(data){
  const scroll = document.getElementById("reportsScroll");
  scroll.innerHTML = "";

  const reportLookup = {};

  const sortedReports = [...data.reports].sort((a, b) =>
    new Date(b.report_time) - new Date(a.report_time)
  );

  for (const office of OFFICE_ORDER){
    const officeReports = sortedReports.filter(r => r.office === office.code);

    const officeHeader = document.createElement("div");
    officeHeader.className = "office-header";
    officeHeader.textContent = `${office.name} (${office.code})`;
    scroll.appendChild(officeHeader);

    if (!officeReports.length){
      const empty = document.createElement("div");
      empty.className = "office-empty";
      empty.textContent = "No storm reports in the last 24 hours";
      scroll.appendChild(empty);
      continue;
    }

    for (const r of officeReports){
      const row = document.createElement("div");
      row.className = "report-row";
      row.dataset.reportId = r.id;

      row.innerHTML = `
        <div class="col-time">${escapeHtml(formatRowTime(r.report_time))}</div>
        <div class="col-event">
          <span class="event-pill ${getEventCssClass(r.event, r.magnitude)}">${escapeHtml(r.event)}</span>
        </div>
        <div class="col-mag">${escapeHtml(r.magnitude || "—")}</div>
        <div class="col-location">${escapeHtml(r.location || "—")}</div>
        <div class="col-county">${escapeHtml(r.county || "—")}</div>
        <div class="col-source">${escapeHtml(r.source || "—")}</div>
        <div class="remarks">${escapeHtml(r.remarks || "—")}</div>
      `;

      row.addEventListener("click", () => {
        highlightReport(r.id);
        if (markerLookup[r.id]){
          map.flyTo([r.lat, r.lon], Math.max(map.getZoom(), 9), { duration: 0.75 });
          markerLookup[r.id].openPopup();
        }
      });

      scroll.appendChild(row);
      reportLookup[r.id] = row;
    }
  }

  window.reportRowLookup = reportLookup;
}

function highlightReport(reportId){
  document.querySelectorAll(".report-row.active").forEach(el => el.classList.remove("active"));
  const row = window.reportRowLookup?.[reportId];
  if (row){
    row.classList.add("active");
    row.scrollIntoView({ block:"nearest", behavior:"smooth" });
  }
}

let map;
const markerLookup = {};

function initMap(data){
  map = L.map("map", {
    zoomControl:true,
    attributionControl:true
  }).setView([40.9, -77.7], 7);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 18,
    attribution: "&copy; OpenStreetMap contributors"
  }).addTo(map);

  officeBoxes.forEach(box => {
    L.rectangle(box.bounds, {
      color:"#5f6670",
      weight:1,
      fill:false,
      opacity:0.8,
      dashArray:"4 4"
    }).addTo(map);

    L.marker(box.label, {
      interactive:false,
      icon: L.divIcon({
        className:"",
        html:`<div class="wfo-label">${box.name}</div>`,
        iconSize:[90,20],
        iconAnchor:[45,10]
      })
    }).addTo(map);
  });

  const markers = [];
  data.reports.forEach(r => {
    if (typeof r.lat !== "number" || typeof r.lon !== "number") return;

    const color = getEventColor(r.event, r.magnitude);

    const marker = L.circleMarker([r.lat, r.lon], {
      radius:7,
      color:"#0b0b0c",
      weight:1.5,
      fillColor:color,
      fillOpacity:0.95
    }).addTo(map);

    marker.bindPopup(buildPopupHtml(r), { maxWidth: 320 });

    marker.on("click", () => {
      highlightReport(r.id);
    });

    markerLookup[r.id] = marker;
    markers.push(marker);
  });

  if (markers.length){
    const group = L.featureGroup(markers);
    map.fitBounds(group.getBounds().pad(0.30));
  }
}

function buildPopupHtml(r){
  return `
    <div class="popup-title">${escapeHtml(r.event || "Storm Report")}</div>
    <div class="popup-grid">
      <div class="popup-label">Time</div><div>${escapeHtml(formatDateTimeHeader(r.report_time))}</div>
      <div class="popup-label">Location</div><div>${escapeHtml(r.location || "—")}</div>
      <div class="popup-label">County</div><div>${escapeHtml(r.county || "—")}</div>
      <div class="popup-label">Office</div><div>${escapeHtml((officeDisplayName[r.office] || r.office_name || r.office || "—") + " (" + (r.office || "—") + ")")}</div>
      <div class="popup-label">Source</div><div>${escapeHtml(r.source || "—")}</div>
      <div class="popup-label">Magnitude</div><div>${escapeHtml(r.magnitude || "—")}</div>
      <div class="popup-label">Remarks</div><div>${escapeHtml(r.remarks || "—")}</div>
    </div>
  `;
}

renderHeader(boardData);
renderReports(boardData);
initMap(boardData);
</script>
</body>
</html>
