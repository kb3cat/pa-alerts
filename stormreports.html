<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NWS/Pennsylvania Storm Reports</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>
:root{
  --bg:#0f0f10;
  --panel:#1d1d1f;
  --panel-dark:#18181a;
  --office:#242427;
  --border:#2a2a2d;
  --text:#e9e9ea;
  --muted:#a7a7aa;

  --wind:#00bfff;
  --hail:#29d36a;
  --tornado:#ff3b30;
  --flood:#ff9f0a;
  --winter:#b06cff;
  --other:#8e8e93;
}

*{ box-sizing:border-box; }

html, body{
  margin:0;
  padding:0;
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:Arial, Helvetica, sans-serif;
  overflow:hidden;
}

body{
  display:flex;
  flex-direction:column;
}

/* HEADER */
.topbar{
  flex:0 0 84px;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:18px;
  padding:12px 16px 10px 16px;
  background:#222;
  border-bottom:2px solid var(--border);
}

.header-left{
  display:flex;
  flex-direction:column;
  min-width:0;
}

.title{
  font-size:30px;
  font-weight:700;
  line-height:1.1;
  letter-spacing:.2px;
}

.last-updated{
  margin-top:6px;
  font-size:14px;
  color:var(--muted);
  font-weight:600;
}

.header-right{
  text-align:right;
  font-size:14px;
  color:var(--text);
  font-weight:600;
  line-height:1.35;
  max-width:520px;
}

/* MAIN */
.main{
  flex:1 1 auto;
  min-height:0;
  display:flex;
  flex-direction:column;
}

/* MAP */
.map-wrap{
  flex:0 0 48%;
  min-height:280px;
  background:var(--panel);
  border-bottom:2px solid var(--border);
  position:relative;
}

#map{
  width:100%;
  height:100%;
}

.map-legend{
  position:absolute;
  right:12px;
  bottom:12px;
  z-index:500;
  background:rgba(24,24,26,.92);
  border:1px solid var(--border);
  border-radius:8px;
  padding:8px 10px;
  font-size:12px;
  line-height:1.5;
  box-shadow:0 2px 8px rgba(0,0,0,.35);
}

.map-legend .legend-title{
  font-weight:700;
  margin-bottom:4px;
  color:var(--text);
}

.legend-item{
  display:flex;
  align-items:center;
  gap:7px;
  color:var(--text);
}

.legend-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  display:inline-block;
}

/* REPORTS AREA */
.reports-shell{
  flex:1 1 auto;
  min-height:0;
  display:flex;
  flex-direction:column;
  background:var(--bg);
}

/* locked row */
.column-header{
  flex:0 0 auto;
  display:grid;
  grid-template-columns: 90px 160px 90px 170px 130px 150px 1fr;
  gap:0;
  background:var(--panel-dark);
  border-bottom:2px solid var(--border);
  border-top:1px solid var(--border);
  padding-right:12px; /* helps align with scroll area */
}

.column-header div{
  padding:10px 10px;
  font-size:13px;
  font-weight:700;
  text-transform:none;
  color:var(--text);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* scrolling content */
.reports-scroll{
  flex:1 1 auto;
  min-height:0;
  overflow-y:auto;
  overflow-x:hidden;
  background:var(--bg);
}

/* office sections */
.office-header{
  background:var(--office);
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  padding:8px 12px;
  font-size:16px;
  font-weight:700;
  letter-spacing:.2px;
}

.office-empty{
  padding:14px 12px 18px 12px;
  color:var(--muted);
  font-size:14px;
  background:var(--panel);
  border-bottom:1px solid var(--border);
}

.report-row{
  display:grid;
  grid-template-columns: 90px 160px 90px 170px 130px 150px 1fr;
  gap:0;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  cursor:pointer;
  transition:background .15s ease;
}

.report-row:hover{
  background:#252528;
}

.report-row.active{
  background:#2b2b31;
  outline:1px solid #3a3a40;
}

.report-row > div{
  padding:9px 10px;
  font-size:13px;
  line-height:1.35;
  overflow:hidden;
  text-overflow:ellipsis;
}

.col-time,
.col-mag,
.col-county{
  white-space:nowrap;
}

.col-event{
  font-weight:700;
}

.event-pill{
  display:inline-block;
  padding:2px 7px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
  line-height:1.2;
  color:#fff;
}

.event-wind{ background:var(--wind); color:#00151d; }
.event-hail{ background:var(--hail); color:#041a0b; }
.event-tornado{ background:var(--tornado); }
.event-flood{ background:var(--flood); color:#241500; }
.event-winter{ background:var(--winter); }
.event-other{ background:var(--other); }

.remarks{
  white-space:normal;
  overflow:visible;
  text-overflow:unset;
}

/* Leaflet popup cleanup */
.leaflet-popup-content-wrapper,
.leaflet-popup-tip{
  background:#1d1d1f;
  color:var(--text);
}

.leaflet-popup-content{
  margin:10px 12px;
  font-family:Arial, Helvetica, sans-serif;
  font-size:13px;
  line-height:1.45;
}

.popup-title{
  font-weight:700;
  font-size:14px;
  margin-bottom:6px;
}

.popup-grid{
  display:grid;
  grid-template-columns:auto 1fr;
  gap:3px 8px;
}

.popup-label{
  color:var(--muted);
  font-weight:700;
}

/* WFO label style */
.wfo-label{
  background:rgba(24,24,26,.86);
  color:var(--text);
  border:1px solid var(--border);
  padding:2px 6px;
  border-radius:4px;
  font-size:11px;
  font-weight:700;
  white-space:nowrap;
}

@media (max-width: 1200px){
  .title{ font-size:24px; }
  .header-right{ font-size:13px; max-width:420px; }
  .column-header,
  .report-row{
    grid-template-columns: 80px 145px 80px 150px 120px 135px 1fr;
  }
}
</style>
</head>
<body>

  <header class="topbar">
    <div class="header-left">
      <div class="title">NWS/Pennsylvania Storm Reports</div>
      <div class="last-updated" id="lastUpdated">Last Updated: --/--/-- --:-- hours</div>
    </div>
    <div class="header-right" id="reportWindow">
      Storm reports from --/--/-- at --:-- hours to --/--/-- at --:-- hours
    </div>
  </header>

  <main class="main">
    <section class="map-wrap">
      <div id="map"></div>

      <div class="map-legend">
        <div class="legend-title">Report Types</div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--wind)"></span> Wind</div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--hail)"></span> Hail</div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--tornado)"></span> Tornado</div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--flood)"></span> Flood</div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--winter)"></span> Winter</div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--other)"></span> Other</div>
      </div>
    </section>

    <section class="reports-shell">
      <div class="column-header">
        <div>Time</div>
        <div>Event</div>
        <div>Mag</div>
        <div>Location</div>
        <div>County</div>
        <div>Source</div>
        <div>Remarks</div>
      </div>

      <div class="reports-scroll" id="reportsScroll"></div>
    </section>
  </main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

------------------------------------------------------- */

/* -------------------------------------------------------
   CONFIG
------------------------------------------------------- */
const OFFICE_ORDER = [
  { code:"PIT", name:"Pittsburgh" },
  { code:"CLE", name:"Cleveland" },
  { code:"CTP", name:"State College" },
  { code:"BGM", name:"Binghamton" },
  { code:"PHI", name:"Mount Holly" }
];

const officeDisplayName = {
  PIT: "Pittsburgh",
  CLE: "Cleveland",
  CTP: "State College",
  BGM: "Binghamton",
  PHI: "Mount Holly"
};

/* Placeholder office boundary rectangles.
   Replace later with actual GeoJSON boundary data. */
const officeBoxes = [
  {
    code:"PIT",
    name:"Pittsburgh (PIT)",
    bounds:[[39.70,-80.90],[41.10,-78.20]],
    label:[40.45,-79.55]
  },
  {
    code:"CLE",
    name:"Cleveland (CLE)",
    bounds:[[41.00,-81.00],[42.30,-79.30]],
    label:[41.65,-80.15]
  },
  {
    code:"CTP",
    name:"State College (CTP)",
    bounds:[[39.50,-78.80],[41.60,-76.00]],

  },
  {
    code:"BGM",
    name:"Binghamton (BGM)",
    bounds:[[41.55,-76.25],[42.65,-74.25]],
    label:[42.10,-75.25]
  },
  {
    code:"PHI",
    name:"Mount Holly (PHI)",
    bounds:[[39.55,-76.20],[40.55,-74.10]],
    label:[40.00,-75.10]
  }
];

/* -------------------------------------------------------
   HELPERS
------------------------------------------------------- */
function formatDateTimeHeader(dateStr){
  const d = new Date(dateStr);
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  const yy = String(d.getFullYear()).slice(-2);
  const hh = String(d.getHours()).padStart(2,"0");
  const min = String(d.getMinutes()).padStart(2,"0");
  return `${mm}/${dd}/${yy} ${hh}:${min} hours`;
}

function formatWindowText(dateStr){
  const d = new Date(dateStr);
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  const yy = String(d.getFullYear()).slice(-2);
  const hh = String(d.getHours()).padStart(2,"0");
  const min = String(d.getMinutes()).padStart(2,"0");
  return `${mm}/${dd}/${yy} at ${hh}:${min} hours`;
}

function formatRowTime(dateStr){
  const d = new Date(dateStr);
  const hh = String(d.getHours()).padStart(2,"0");
  const min = String(d.getMinutes()).padStart(2,"0");
  return `${hh}:${min}`;
}

function escapeHtml(str){
  return String(str ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function getEventClass(eventName){
  const e = (eventName || "").toLowerCase();
  if (e.includes("tornado") || e.includes("funnel")) return "tornado";
  if (e.includes("hail")) return "hail";
  if (e.includes("flood")) return "flood";
  if (e.includes("snow") || e.includes("ice") || e.includes("winter") || e.includes("blizzard") || e.includes("sleet")) return "winter";
  if (e.includes("wind")) return "wind";
  return "other";
}

function getEventColor(eventName){
  const cls = getEventClass(eventName);
  if (cls === "tornado") return getCssVar("--tornado");
  if (cls === "hail") return getCssVar("--hail");
  if (cls === "flood") return getCssVar("--flood");
  if (cls === "winter") return getCssVar("--winter");
  if (cls === "wind") return getCssVar("--wind");
  return getCssVar("--other");
}

function getCssVar(name){
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

/* -------------------------------------------------------
   HEADER
------------------------------------------------------- */
function renderHeader(data){
  document.getElementById("lastUpdated").textContent =
    `Last Updated: ${formatDateTimeHeader(data.generated_at)}`;

  document.getElementById("reportWindow").textContent =
    `Storm reports from ${formatWindowText(data.window_start)} to ${formatWindowText(data.window_end)}`;
}

/* -------------------------------------------------------
   REPORTS
------------------------------------------------------- */
function renderReports(data){
  const scroll = document.getElementById("reportsScroll");
  scroll.innerHTML = "";

  const reportLookup = {};

  const sortedReports = [...data.reports].sort((a,b) =>
    new Date(b.report_time) - new Date(a.report_time)
  );

  for (const office of OFFICE_ORDER){
    const officeReports = sortedReports.filter(r => r.office === office.code);

    const officeHeader = document.createElement("div");
    officeHeader.className = "office-header";
    officeHeader.textContent = `${office.name} (${office.code})`;
    scroll.appendChild(officeHeader);

    if (!officeReports.length){
      const empty = document.createElement("div");
      empty.className = "office-empty";
      empty.textContent = "No storm reports in the last 24 hours";
      scroll.appendChild(empty);
      continue;
    }

    for (const r of officeReports){
      const row = document.createElement("div");
      row.className = "report-row";
      row.dataset.reportId = r.id;

      row.innerHTML = `
        <div class="col-time">${escapeHtml(formatRowTime(r.report_time))}</div>
        <div class="col-event">
          <span class="event-pill event-${getEventClass(r.event)}">${escapeHtml(r.event)}</span>
        </div>
        <div class="col-mag">${escapeHtml(r.magnitude || "—")}</div>
        <div class="col-location">${escapeHtml(r.location || "—")}</div>
        <div class="col-county">${escapeHtml(r.county || "—")}</div>
        <div class="col-source">${escapeHtml(r.source || "—")}</div>
        <div class="remarks">${escapeHtml(r.remarks || "—")}</div>
      `;

      row.addEventListener("click", () => {
        highlightReport(r.id);
        if (markerLookup[r.id]){
          map.flyTo([r.lat, r.lon], Math.max(map.getZoom(), 9), { duration: 0.75 });
          markerLookup[r.id].openPopup();
        }
      });

      scroll.appendChild(row);
      reportLookup[r.id] = row;
    }
  }

  window.reportRowLookup = reportLookup;
}

function highlightReport(reportId){
  document.querySelectorAll(".report-row.active").forEach(el => el.classList.remove("active"));
  const row = window.reportRowLookup?.[reportId];
  if (row){
    row.classList.add("active");
    row.scrollIntoView({ block:"nearest", behavior:"smooth" });
  }
}

/* -------------------------------------------------------
   MAP
------------------------------------------------------- */
let map;
const markerLookup = {};

function initMap(data){
  map = L.map("map", {
    zoomControl:true,
    attributionControl:true
  }).setView([40.9, -77.7], 7);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 18,
    attribution: "&copy; OpenStreetMap contributors"
  }).addTo(map);

  // Placeholder WFO boundary boxes
  officeBoxes.forEach(box => {
    L.rectangle(box.bounds, {
      color:"#5f6670",
      weight:1,
      fill:false,
      opacity:0.8,
      dashArray:"4 4"
    }).addTo(map);

    L.marker(box.label, {
      interactive:false,
      icon: L.divIcon({
        className:"",
        html:`<div class="wfo-label">${box.name}</div>`,
        iconSize:[90,20],
        iconAnchor:[45,10]
      })
    }).addTo(map);
  });

  // Report markers
  const markers = [];
  data.reports.forEach(r => {
    if (typeof r.lat !== "number" || typeof r.lon !== "number") return;

    const color = getEventColor(r.event);

    const marker = L.circleMarker([r.lat, r.lon], {
      radius:7,
      color:"#0b0b0c",
      weight:1.5,
      fillColor:color,
      fillOpacity:0.95
    }).addTo(map);

    marker.bindPopup(buildPopupHtml(r), { maxWidth: 320 });

    marker.on("click", () => {
      highlightReport(r.id);
    });

    markerLookup[r.id] = marker;
    markers.push(marker);
  });

  if (markers.length){
    const group = L.featureGroup(markers);
    map.fitBounds(group.getBounds().pad(0.30));
  }
}

function buildPopupHtml(r){
  return `
    <div class="popup-title">${escapeHtml(r.event || "Storm Report")}</div>
    <div class="popup-grid">
      <div class="popup-label">Time</div><div>${escapeHtml(formatDateTimeHeader(r.report_time))}</div>
      <div class="popup-label">Location</div><div>${escapeHtml(r.location || "—")}</div>
      <div class="popup-label">County</div><div>${escapeHtml(r.county || "—")}</div>
      <div class="popup-label">Office</div><div>${escapeHtml((officeDisplayName[r.office] || r.office_name || r.office || "—") + " (" + (r.office || "—") + ")")}</div>
      <div class="popup-label">Source</div><div>${escapeHtml(r.source || "—")}</div>
      <div class="popup-label">Magnitude</div><div>${escapeHtml(r.magnitude || "—")}</div>
      <div class="popup-label">Remarks</div><div>${escapeHtml(r.remarks || "—")}</div>
    </div>
  `;
}

/* -------------------------------------------------------
   INIT
------------------------------------------------------- */
renderHeader(boardData);
renderReports(boardData);
initMap(boardData);
</script>
