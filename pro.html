<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PA Media Deck</title>
  <style>
    :root {
      --bg: #000;
      --panel: #050505;
      --panel2: #101419;
      --border: #263241;
      --text: #e6edf3;
      --muted: #8fa3b8;
      --blue: #1d9bf0;
      --card: #050505;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .topbar {
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      border-bottom: 1px solid var(--border);
      background: #050505;
    }

    .brand {
      font-weight: 800;
      font-size: 16px;
    }

    .updated {
      color: var(--muted);
      font-size: 12px;
    }

    .deck {
      height: calc(100vh - 42px);
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
    }

    .column {
      width: 320px;
      min-width: 320px;
      height: 100%;
      border-right: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      flex-direction: column;
    }

    .column-header {
      padding: 10px 12px 6px;
      border-bottom: 1px solid var(--border);
      background: #050505;
    }

    .column-kicker {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 2px;
    }

    .column-title {
      font-size: 16px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .column-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: #050505;
    }

    .tab {
      flex: 1;
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 9px 6px 8px;
      font-size: 13px;
      cursor: pointer;
    }

    .tab.active {
      color: #fff;
      border-bottom: 3px solid var(--blue);
      font-weight: 800;
    }

    .items {
      overflow-y: auto;
      flex: 1;
    }

    .card {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }

    .card:hover {
      background: #080d12;
    }

    .card-source {
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .card-title {
      font-size: 14px;
      line-height: 1.25;
      font-weight: 800;
      color: var(--text);
      text-decoration: none;
      display: block;
      margin-bottom: 6px;
    }

    .card-title:hover {
      text-decoration: underline;
    }

    .card-desc {
      color: #d0d7de;
      font-size: 13px;
      line-height: 1.25;
      margin-bottom: 8px;
    }

    .card-image {
      width: 100%;
      max-height: 180px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid #202b36;
      margin: 4px 0 8px;
      display: block;
      background: #111;
    }

    .card-footer {
      color: var(--muted);
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .empty {
      padding: 18px 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .error-note {
      margin: 10px 12px;
      padding: 8px;
      border: 1px solid #5c2b2b;
      background: #1a0808;
      color: #ffb4b4;
      border-radius: 8px;
      font-size: 12px;
    }

    .modal.hidden { display: none; }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .modal-card {
      width: min(560px, 92vw);
      max-height: 82vh;
      overflow: hidden;
      background: #0f1720;
      color: var(--text);
      border: 1px solid #2b3a4a;
      border-radius: 16px;
      box-shadow: 0 18px 60px rgba(0,0,0,.6);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h2 {
      margin: 0;
      font-size: 18px;
    }

    .modal-close {
      border: 0;
      background: transparent;
      color: var(--text);
      font-size: 30px;
      cursor: pointer;
      line-height: 1;
    }

    .modal-body {
      padding: 14px 16px;
      overflow-y: auto;
      max-height: 68vh;
    }

    .source-row {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .source-row:last-child { border-bottom: 0; }

    .source-name {
      font-weight: 800;
      margin-bottom: 3px;
    }

    .source-type {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .source-url {
      display: block;
      color: #58a6ff;
      font-size: 12px;
      word-break: break-all;
      text-decoration: none;
    }

    .source-url:hover { text-decoration: underline; }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="brand">PA Media Deck</div>
    <div id="updated" class="updated">Loading…</div>
  </header>

  <main id="deck" class="deck"></main>

  <div id="sourcesModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="sourcesModalTitle">Sources</h2>
        <button id="closeSourcesModal" class="modal-close" type="button">×</button>
      </div>
      <div id="sourcesModalBody" class="modal-body"></div>
    </div>
  </div>

  <script>
    const DATA_URL = "data/media_deck.json";
    const SOURCES_URL = "data/media_sources.json";
    const PSP_X_URL = "data/psp_x.json";

    let mediaSourcesConfig = null;

    function escapeHtml(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDateTime(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "";
      return d.toLocaleString("en-US", {
        month: "2-digit",
        day: "2-digit",
        year: "2-digit",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function timeAgo(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "";

      const diff = Date.now() - d.getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return "now";
      if (mins < 60) return `${mins}m`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h`;
      const days = Math.floor(hrs / 24);
      return `${days}d`;
    }

    async function loadJson(url) {
      const res = await fetch(`${url}?v=${Date.now()}`, { cache: "no-store" });
      if (!res.ok) throw new Error(`${url} HTTP ${res.status}`);
      return await res.json();
    }

    async function loadSourcesConfig() {
      try {
        mediaSourcesConfig = await loadJson(SOURCES_URL);
      } catch (err) {
        console.warn("Could not load media_sources.json", err);
        mediaSourcesConfig = { markets: [] };
      }
    }

    async function mergePspX(deckData) {
      try {
        const psp = await loadJson(PSP_X_URL);

        const pspItems = (psp.items || []).map((item, idx) => ({
          id: item.url || item.published_at || `psp-x-${idx}`,
          source: item.source || "PA State Police (X)",
          title: item.title || item.text || "PA State Police post",
          description: item.text || "",
          url: item.url || "https://x.com/pastatepolice",
          image: item.image || "",
          published_at: item.published_at || psp.generated_at || new Date().toISOString()
        }));

        let pspMarket = deckData.markets.find(m => m.id === "psp");

        if (!pspMarket) {
          pspMarket = {
            id: "psp",
            title: "PA State Police",
            items: [],
            errors: []
          };
          deckData.markets.push(pspMarket);
        }

        const seen = new Set();
        pspMarket.items = [...pspItems, ...(pspMarket.items || [])]
          .sort((a, b) => new Date(b.published_at) - new Date(a.published_at))
          .filter(item => {
            const key = item.url || item.title || item.id;
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
          })
          .slice(0, 50);

      } catch (err) {
        console.warn("Could not merge PSP X data", err);
      }

      return deckData;
    }

    function openSourcesModal(marketId) {
      const modal = document.getElementById("sourcesModal");
      const title = document.getElementById("sourcesModalTitle");
      const body = document.getElementById("sourcesModalBody");

      const market = mediaSourcesConfig?.markets?.find(m => m.id === marketId);

      title.textContent = market ? `${market.title} Sources` : "Sources";

      if (!market || !market.sources || market.sources.length === 0) {
        body.innerHTML = `<p>No sources configured for this column.</p>`;
      } else {
        body.innerHTML = market.sources.map(src => `
          <div class="source-row">
            <div class="source-name">${escapeHtml(src.name || "Unnamed source")}</div>
            <div class="source-type">${escapeHtml(src.type || "source")}</div>
            ${src.url ? `<a class="source-url" href="${escapeHtml(src.url)}" target="_blank" rel="noopener">${escapeHtml(src.url)}</a>` : ""}
          </div>
        `).join("");
      }

      modal.classList.remove("hidden");
    }

    function closeSourcesModal() {
      document.getElementById("sourcesModal").classList.add("hidden");
    }

    function renderCard(item) {
      const title = escapeHtml(item.title || "Untitled");
      const source = escapeHtml(item.source || "Unknown source");
      const desc = escapeHtml(item.description || "");
      const url = escapeHtml(item.url || "#");
      const img = item.image ? escapeHtml(item.image) : "";
      const ago = timeAgo(item.published_at);
      const fullTime = formatDateTime(item.published_at);

      return `
        <article class="card">
          <div class="card-source">${source}</div>
          <a class="card-title" href="${url}" target="_blank" rel="noopener">${title}</a>
          ${img ? `<img class="card-image" src="${img}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display='none'">` : ""}
          ${desc && desc !== title ? `<div class="card-desc">${desc}</div>` : ""}
          <div class="card-footer">
            <span>${escapeHtml(ago)}</span>
            <span>${escapeHtml(fullTime)}</span>
          </div>
        </article>
      `;
    }

    function renderColumn(market) {
      const items = market.items || [];
      const errors = market.errors || [];

      return `
        <section class="column">
          <div class="column-header">
            <div class="column-kicker">Search</div>
            <div class="column-title" title="${escapeHtml(market.title || market.id)}">${escapeHtml(market.title || market.id)}</div>
          </div>

          <div class="column-tabs">
            <button class="tab active" type="button">Latest</button>
            <button class="tab sources-tab" type="button" data-market-id="${escapeHtml(market.id)}">Sources</button>
          </div>

          ${errors.length ? `<div class="error-note">${escapeHtml(errors.length)} source error(s). Check Sources/config.</div>` : ""}

          <div class="items">
            ${items.length ? items.map(renderCard).join("") : `<div class="empty">No data currently available.</div>`}
          </div>
        </section>
      `;
    }

    function renderDeck(deckData) {
      const deck = document.getElementById("deck");
      deck.innerHTML = (deckData.markets || []).map(renderColumn).join("");

      document.getElementById("updated").textContent =
        deckData.generated_at
          ? `Updated ${formatDateTime(deckData.generated_at)}`
          : "Updated";
    }

    async function init() {
      await loadSourcesConfig();

      let deckData = await loadJson(DATA_URL);
      deckData = await mergePspX(deckData);

      renderDeck(deckData);
    }

    document.addEventListener("click", (e) => {
      const sourcesBtn = e.target.closest(".sources-tab");
      if (sourcesBtn) {
        openSourcesModal(sourcesBtn.dataset.marketId);
      }

      if (e.target.id === "closeSourcesModal" || e.target.id === "sourcesModal") {
        closeSourcesModal();
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeSourcesModal();
    });

    init().catch(err => {
      console.error(err);
      document.getElementById("deck").innerHTML =
        `<div class="empty">Unable to load media deck data.</div>`;
      document.getElementById("updated").textContent = "Load error";
    });
  </script>
</body>

<body>
  <div class="topbar">
    <div class="brand">PA Media Deck</div>
    <div class="meta" id="updated">Loading…</div>
    <div class="spacer"></div>
    <button class="btn" onclick="loadDeck(true)">Refresh</button>
  </div>
  <main class="deck" id="deck"></main>

<script>
const DATA_URL = '/data/media_deck.json';
const AUTO_REFRESH_MS = 120000;

function escapeHtml(s = '') { return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function parseDate(v) { const d = new Date(v); return isNaN(d) ? null : d; }
function fmtFull(v) {
  const d = parseDate(v); if (!d) return '';
  return d.toLocaleString([], { month:'2-digit', day:'2-digit', year:'2-digit', hour:'numeric', minute:'2-digit' });
}
function age(v) {
  const d = parseDate(v); if (!d) return '';
  const sec = Math.max(0, Math.floor((Date.now() - d.getTime()) / 1000));
  if (sec < 60) return `${sec}s`;
  const min = Math.floor(sec / 60); if (min < 60) return `${min}m`;
  const hr = Math.floor(min / 60); if (hr < 48) return `${hr}h`;
  const days = Math.floor(hr / 24); return `${days}d`;
}
function initials(name='?') { return name.split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase() || '?'; }
function imgTag(url, title) {
  if (!url) return '';
  return `<div class="media"><img loading="lazy" src="${escapeHtml(url)}" alt="${escapeHtml(title || 'media image')}" onerror="this.closest('.media').remove()"></div>`;
}
function itemCard(item) {
  const href = item.url || '#';
  const desc = item.description ? `<p class="desc">${escapeHtml(item.description)}</p>` : '';
  const tag = item.type ? `<span class="tag">${escapeHtml(item.type)}</span>` : '<span></span>';
  return `<a class="card" href="${escapeHtml(href)}" target="_blank" rel="noopener">
    <div class="source-line">
      <span class="avatar">${escapeHtml(initials(item.source))}</span>
      <span class="source">${escapeHtml(item.source || 'Source')}</span>
      <span class="age">· ${escapeHtml(age(item.published_at))}</span>
    </div>
    <div class="title">${escapeHtml(item.title || 'Untitled')}</div>
    ${desc}
    ${imgTag(item.image, item.title)}
    <div class="foot"><span>${escapeHtml(fmtFull(item.published_at))}</span>${tag}</div>
  </a>`;
}
function columnHtml(market) {
  const items = Array.isArray(market.items) ? market.items : [];
  return `<section class="column">
    <div class="col-head">
      <div class="col-title-row"><div class="col-title">${escapeHtml(market.title)}</div><div class="count">${items.length}</div></div>
      <div class="tabs"><span class="tab active">Latest</span><span class="tab">Sources</span><span class="tab">Media</span></div>
    </div>
    <div class="items">${items.length ? items.map(itemCard).join('') : '<div class="empty">No recent items.</div>'}</div>
  </section>`;
}
async function loadDeck(manual=false) {
  const deck = document.getElementById('deck');
  const updated = document.getElementById('updated');
  try {
    const res = await fetch(`${DATA_URL}?v=${Date.now()}`, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    deck.innerHTML = (data.markets || []).map(columnHtml).join('');
    const stamp = fmtFull(data.generated_at);
    updated.textContent = stamp ? `Data updated ${stamp}` : 'Data loaded';
    const generated = parseDate(data.generated_at);
    if (generated && Date.now() - generated.getTime() > 20 * 60 * 1000) updated.classList.add('stale'); else updated.classList.remove('stale');
  } catch (err) {
    if (!deck.innerHTML || manual) deck.innerHTML = `<div class="error">Could not load ${DATA_URL}: ${escapeHtml(err.message)}</div>`;
    updated.textContent = 'Data load error';
  }
}
loadDeck();
setInterval(loadDeck, AUTO_REFRESH_MS);
</script>
