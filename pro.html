<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PA Media Deck</title>

<style>
:root {
  --bg:#000;
  --panel:#050505;
  --border:#263241;
  --text:#e6edf3;
  --muted:#8fa3b8;
  --blue:#1d9bf0;
  --card:#050505;
  --green:#2ecc71;
  --yellow:#f1c40f;
  --red:#e74c3c;
}

* { box-sizing: border-box; }

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Arial, Helvetica, sans-serif;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* TOP BAR */
.topbar{
  height:42px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 14px;
  border-bottom:1px solid var(--border);
}

.brand{font-weight:800;}

.updated{
  font-size:12px;
  color:var(--muted);
  display:flex;
  align-items:center;
  gap:6px;
}

.status-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--muted);
}

.status-dot.fresh{background:var(--green);}
.status-dot.aging{background:var(--yellow);}
.status-dot.stale{background:var(--red);}

/* MAIN */
.deck{
  flex:1;
  display:flex;
  overflow-x:auto;
  overflow-y:hidden;
}

/* COLUMN */
.column{
  width:320px;
  min-width:320px;
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
}

.column-header{
  padding:10px 12px;
  border-bottom:1px solid var(--border);
  font-weight:800;
}

.items{
  overflow-y:auto;
  flex:1;
}

/* CARD */
.card{
  padding:10px 12px;
  border-bottom:1px solid var(--border);
}

.card-source{
  font-size:11px;
  color:var(--muted);
  font-weight:700;
  margin-bottom:4px;
}

.card-title{
  font-weight:800;
  font-size:14px;
  display:block;
  margin-bottom:6px;
  color:var(--text);
  text-decoration:none;
}

.card-title:hover{text-decoration:underline;}

.card-desc{
  font-size:13px;
  color:#ccc;
  display:block;
  text-decoration:none;
}

.card-desc:hover{text-decoration:underline;}

.card-image{
  width:100%;
  max-height:180px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:6px;
}

.card-footer{
  font-size:11px;
  color:var(--muted);
  display:flex;
  justify-content:space-between;
  margin-top:6px;
}

.empty{
  padding:12px;
  color:var(--muted);
}

/* MODAL */
.modal.hidden{display:none;}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.modal-card{
  width:min(560px,92vw);
  background:#0f1720;
  border-radius:12px;
  padding:16px;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <div class="brand">PA Media Deck</div>

  <div class="updated">
    <span id="statusDot" class="status-dot"></span>
    <span id="updatedText"></span>
  </div>
</div>

<!-- MAIN -->
<div id="deck" class="deck"></div>

<!-- FOOTER (IMPORTANT) -->
<footer id="site-footer"></footer>

<!-- MODAL -->
<div id="sourcesModal" class="modal hidden">
  <div class="modal-card">
    <h3 id="sourcesModalTitle">Sources</h3>
    <div id="sourcesModalBody"></div>
  </div>
</div>

<script>
const DATA_URL = "data/media_deck.json";

/* HELPERS */
function cleanTitle(t){
  return (t||"")
    .replace(/^\d+\s+PHOTOS?\s*\|\s*/i,"")
    .replace(/^\d+\s+HOURS?\s+AGO\s*\|\s*/i,"")
    .replace(/^\d+\s+MINUTES?\s+AGO\s*\|\s*/i,"")
    .trim();
}

function timeAgo(date){
  const diff = Date.now() - new Date(date);
  const m = Math.floor(diff/60000);
  if(m<1) return "now";
  if(m<60) return m+"m";
  const h = Math.floor(m/60);
  if(h<24) return h+"h";
  return Math.floor(h/24)+"d";
}

function getStatusColor(time){
  const diff = Date.now() - new Date(time);
  const mins = diff/60000;

  if(mins < 10) return "fresh";
  if(mins < 30) return "aging";
  return "stale";
}

/* RENDER */
function renderCard(i){
  const link = i.url || "#";
  const title = cleanTitle(i.title || "");
  const desc = i.description || i.text || "";

  return `
  <div class="card">
    <div class="card-source">${i.source||""}</div>

    ${title ? `<a class="card-title" href="${link}" target="_blank">${title}</a>`:""}

    ${i.image ? `<a href="${link}" target="_blank"><img class="card-image" src="${i.image}" onerror="this.style.display='none'"></a>`:""}

    ${desc ? `<a class="card-desc" href="${link}" target="_blank">${desc}</a>`:""}

    <div class="card-footer">
      <span>${timeAgo(i.published_at)}</span>
      <span>${new Date(i.published_at).toLocaleString()}</span>
    </div>
  </div>`;
}

function renderColumn(m){
  return `
  <div class="column">
    <div class="column-header">${m.title}</div>
    <div class="items">
      ${m.items.length ? m.items.map(renderCard).join("") : `<div class="empty">No data</div>`}
    </div>
  </div>`;
}

/* INIT */
async function init(){
  const res = await fetch(DATA_URL+"?v="+Date.now());
  const data = await res.json();

  const updatedTime = data.generated_at;

  document.getElementById("updatedText").innerText =
    "Updated " + new Date(updatedTime).toLocaleString();

  document.getElementById("statusDot")
    .classList.add(getStatusColor(updatedTime));

  document.getElementById("deck").innerHTML =
    data.markets.map(renderColumn).join("");
}

init();
</script>

<!-- YOUR SHARED FOOTER -->
<script src="/footer.js"></script>

</body>
</html>
